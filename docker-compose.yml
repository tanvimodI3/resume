version: '3.8'

services:

  db:
    image: postgres:15
    container_name: parser_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: parser_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data


  redis:
    image: redis:7
    container_name: parser_redis
    ports:
      - "6379:6379"
    restart: always


volumes:
  pgdata: